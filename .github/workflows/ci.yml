name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Use `npm install`, not `npm ci`: the lockfile is generated on Windows and npm
      # can't fully represent the cross-platform optional native deps (@emnapi/* via
      # sharp/lightningcss wasm fallbacks), so strict `npm ci` fails on Linux runners.
      # See npm/cli#4828. `npm install` reconciles the same locked versions.
      - run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
